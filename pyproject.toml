[tool.pytest.ini_options]
testpaths = ["easy", "medium", "hard"]
addopts = "-q"

[tool.coverage.run]
source = ["."]
omit = ["scripts/*", "*/test_*.py", "*/run_tests.py", "conftest.py"]

[tool.ruff]
line-length = 88
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I"]

[tool.mypy]
python_version = "3.11"
ignore_missing_imports = true
explicit_package_bases = true
