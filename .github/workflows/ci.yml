name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install tools
        run: pip install ruff mypy
      - name: Lint
        run: ruff check .
      - name: Format check
        run: ruff format --check .
      - name: Type check
        run: |
          find easy medium hard -name "solution.py" | while read f; do
            python -m mypy "$f" --ignore-missing-imports || exit 1
          done

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install tools
        run: pip install pytest pytest-cov
      - name: Run tests
        run: pytest --cov --cov-report=term-missing
